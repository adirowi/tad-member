<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Your TAD Academy Member File</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Get Your TAD Academy Member File</h1>
    <p class="subtitle">Enter your nickname and registered phone number to download your file.</p>
    
    <div id="alert-error" class="alert alert-danger"></div>
    <div id="alert-success" class="alert alert-success"></div>

    <form id="download-form">
      <div class="form-group">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" required placeholder="e.g. adimember">
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required placeholder="e.g. 08123456789">
      </div>
      
      <button type="submit" id="submit-btn" class="btn btn-primary">
        <span class="spinner" id="btn-spinner"></span>
        Download PDF
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
